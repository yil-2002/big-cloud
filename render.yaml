services:
  - type: web
    name: telegram-cloud-bot
    runtime: docker
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bot-postgres
          property: connectionString
    healthCheckPath: /

databases:
  - name: bot-postgres
    plan: free
    ipAllowList: []
